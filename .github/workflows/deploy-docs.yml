
name: 部署文档

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy-gh-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true

      - name: 设置 pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10


      - name: 设置 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: 安装依赖
        run: |
          corepack enable
          pnpm ci

      - name: 构建文档
        env:
          NODE_OPTIONS: --max_old_space_size=8192
        run: |-
          pnpm run docs:build
          > docs/.vuepress/dist/.nojekyll

      - name: 部署文档
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          # 部署文档
          branch: gh-pages
          folder: docs/.vuepress/dist
